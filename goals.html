<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title data-i18n="goals_page_title">أهدافي - مكتبة الأهداف الصغيرة</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
</head>
<body>
<header>
    <div class="header-main">
        <div>
            <h1 data-i18n="goals_title">أهدافي</h1>
            <p data-i18n="goals_subtitle">أضف أهداف صغيرة وخفيفة تقدر تسويها اليوم.</p>
        </div>
        <button id="langToggle" class="lang-toggle" type="button">EN</button>
    </div>
    <nav>
        <a href="index.html" data-i18n="nav_home">الرئيسية</a>
        <a href="goals.html" class="active" data-i18n="nav_goals">أهدافي</a>
        <a href="timeline.html" data-i18n="nav_timeline">خط الزمن</a>
        <a href="tips.html" data-i18n="nav_tips">نصائح</a>
    </nav>
</header>

<main>
    <section class="goal-form">
        <h2 data-i18n="goals_add_title">إضافة هدف جديد</h2>
        <label data-i18n="goals_label_title">عنوان الهدف</label>
        <input id="goalTitle" type="text" placeholder="مثال: أشرب كأس ماء" data-i18n-placeholder="goals_placeholder_title">

        <label data-i18n="goals_label_duration">المدة المتوقعة</label>
        <select id="goalDuration">
            <option value="1" data-i18n="goals_duration_1">١ دقيقة</option>
            <option value="5" data-i18n="goals_duration_5">٥ دقائق</option>
            <option value="10" data-i18n="goals_duration_10">١٠ دقائق</option>
        </select>

        <label data-i18n="goals_label_category">التصنيف</label>
        <select id="goalCategory">
            <option value="health" data-i18n="goals_cat_health">صحة</option>
            <option value="study" data-i18n="goals_cat_study">تعلم</option>
            <option value="work" data-i18n="goals_cat_work">عمل</option>
            <option value="life" data-i18n="goals_cat_life">حياة يومية</option>
        </select>

        <button type="button" onclick="addGoal()" data-i18n="goals_add_button">إضافة الهدف</button>
        <p class="note" data-i18n="goals_note_storage">كل الأهداف تحفظ في جهازك فقط (باستخدام المتصفح).</p>
    </section>

    <section class="goal-list">
        <h2 data-i18n="goals_list_title">قائمة الأهداف</h2>
        <div class="filters">
            <label data-i18n="goals_filter_label">فرز حسب المدة:</label>
            <select id="filterDuration" onchange="renderGoals()">
                <option value="all" data-i18n="goals_filter_all">الكل</option>
                <option value="1" data-i18n="goals_duration_1">دقيقة</option>
                <option value="5" data-i18n="goals_duration_5">٥ دقائق</option>
                <option value="10" data-i18n="goals_duration_10">١٠ دقائق</option>
            </select>
        </div>
        <ul id="goalsContainer">
            <!-- يتم تعبئتها بالجافاسكربت -->
        </ul>
    </section>
</main>

<footer>
    <p data-i18n="footer_goals">تذكّر: هدف صغير أفضل من لا شيء 🌱</p>
</footer>
</body>
</html>
